<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>CSS Exercise 02 - Form</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="form-container">
      <form class="ira-form">
        <h1 class="main-heading-form">Roth IRA Calculator</h1>
        <div class="form-element">
          <label class="form-label" for="balance">Balance ($)</label>
          <input class="form-input" type="text" id="balance" name="balance" />
        </div>
        <div class="form-element">
          <label class="form-label" for="annual">Annual contribution ($)</label>
          <input class="form-input" type="text" id="annual" name="annual" />
        </div>
        <div class="form-element">
          <fieldset>
            <legend>Maximize contributions?</legend>
            <div class="form-radios">
              <input type="radio" id="yes" name="maximize" value="yes" />
              <label class="form-label-radio" for="yes">Yes</label>
              <input type="radio" id="no" name="maximize" value="no" />
              <label class="form-label-radio" for="no">No</label>
            </div>
          </fieldset>
        </div>
        <div class="form-element">
          <label class="form-label" for="rate"
            >Expected rate of return (%)</label
          >
          <input class="form-input" type="number" id="rate" name="rate" />
        </div>
        <div class="form-element">
          <label class="form-label" for="current">Current age</label>
          <input class="form-input" type="number" id="current" name="current" />
        </div>
        <div class="form-element">
          <label class="form-label" for="retire">Retirement age</label>
          <input class="form-input" type="number" id="retire" name="retire" />
        </div>
        <div class="form-element">
          <label class="form-label" for="tax">Marginal tax rate (%)</label>
          <input class="form-input" type="number" id="tax" name="tax" />
        </div>
        <div class="form-element">
          <input class="btn btn-submit" type="submit" value="Calculate" />
          <input class="btn btn-reset" type="reset" value="Reset" />
        </div>
        <p class="form-note">
          This exercise is a simplified version of the Roth IRA Calculator at
          <a href="https://www.calculator.net/roth-ira-calculator.html"
            >Calculator.net</a
          >
        </p>
      </form>
    </main>
  </body>
</html>
