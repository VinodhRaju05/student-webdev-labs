<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Exercise 02 - Form</title>
  </head>
  <body>
    <main>
      <h1>Roth IRA Calculator</h1>
      <form action="submit-form">
        <p>
          <label for="balance">Balance ($)</label><br />
          <input type="text" id="balance" name="balance" />
        </p>
        <p>
          <label for="annual">Annual contribution (4)</label><br />
          <input type="text" id="annual" name="annual" />
        </p>
        <fieldset style="border: 0; margin: 0; padding: 0">
          <legend>Maximize contributions?</legend>
          <input type="radio" id="yes" name="maximize" value="yes" />
          <label for="yes">Yes</label>
          <input type="radio" id="no" name="maximize" value="no" />
          <label for="no">No</label>
        </fieldset>
        <p>
          <label for="rate">Expected rate of return (5)</label><br />
          <input type="number" id="rate" name="rate" />
        </p>
        <p>
          <label for="current">Current age</label><br />
          <input type="number" id="current" name="current" />
        </p>
        <p>
          <label for="retire">Retirement age</label><br />
          <input type="number" id="retire" name="retire" />
        </p>
        <p>
          <label for="tax">Marginal tax rate (%)</label><br />
          <input type="number" id="tax" name="tax" />
        </p>
        <p>
          <input type="submit" value="Calculate" />
          <input type="reset" value="Reset" />
        </p>
      </form>
      <p>
        This exercise is a simplified version of the Roth IRA Calculator at
        <a href="https://www.calculator.net/roth-ira-calculator.html"
          >Calculator.net</a
        >
      </p>
    </main>
  </body>
</html>
