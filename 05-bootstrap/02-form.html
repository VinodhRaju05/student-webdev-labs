<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Exercise 02 - Form</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-light">
    <main class="d-flex align-items-center">
      <form
        action="/submit"
        class="ira-form container mt-5 border border-2 bg-white rounded"
      >
        <div class="row col-12 my-3">
          <h1 class="text-center m-4 fs-2">Roth IRA Calculator</h1>
        </div>
        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="balance"
            >Balance ($)</label
          >
          <div class="col-sm-6">
            <input
              class="form-control"
              type="text"
              id="balance"
              name="balance"
            />
          </div>
        </div>
        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="annual-contribution"
            >Annual contribution ($)</label
          >
          <div class="col-sm-6">
            <input
              class="form-control"
              type="text"
              id="annual-contribution"
              name="annual-contribution"
            />
          </div>
        </div>
        <fieldset class="row mb-3">
          <legend class="col-sm-6 col-form-label">
            Maximize contribution?
          </legend>
          <div class="col-sm-6">
            <div class="formcheck">
              <input
                type="radio"
                class="form-check-input"
                id="yes"
                name="max-contribution"
                value="yes"
              />
              <label class="form-check-label" for="yes">Yes</label>
            </div>
            <div class="formcheck">
              <input
                type="radio"
                class="form-check-input"
                id="no"
                name="max-contribution"
                value="no"
              />
              <label class="form-check-label" for="no">No</label>
            </div>
          </div>
        </fieldset>
        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="rate"
            >Expected return (%)</label
          >
          <div class="col-sm-6">
            <input class="form-control" type="number" value="" id="rate" />
          </div>
        </div>
        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="age">Current age</label>
          <div class="col-sm-6">
            <input class="form-control" type="number" name="age" id="age" />
          </div>
        </div>
        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="retirement"
            >Retirement age</label
          >
          <div class="col-sm-6">
            <input
              class="form-control"
              type="number"
              name="retirement"
              id="retirement"
            />
          </div>
        </div>
        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="tax"
            >Tax rate (%)</label
          >
          <div class="col-sm-6">
            <input class="form-control" type="number" name="tax" id="tax" />
          </div>
        </div>
        <div class="row my-4">
          <div class="d-flex gap-2">
            <input
              class="btn btn-primary w-100"
              type="submit"
              value="Calculate"
            />

            <input
              class="btn btn-outline-dark w-100"
              type="reset"
              value="Reset"
            />
          </div>
        </div>

        <p class="form-note">
          This exercise is a simplified version of the Roth IRA Calculator
          <a class="text-primary" href="https://www.calculator.net/roth-ira-calculator.html">Calculator.net</a>
        </p>
      </form>
    </main>
  </body>
</html>
